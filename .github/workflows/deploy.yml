name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci || npm install
          
      - name: Build frontend
        run: npm run build

  dockerize_and_deploy:
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: panganlink-frontend
          IMAGE_TAG: latest
        run: |
          docker build \
            --build-arg VITE_API_URL=http://panganlink-be-alb-95099952.ap-southeast-1.elb.amazonaws.com/api \
            --build-arg VITE_MIDTRANS_API_URL=https://app.sandbox.midtrans.com/snap/snap.js \
            --build-arg VITE_MIDTRANS_CLIENT_KEY=Mid-client-NPE1WtTzuY0aIU0S \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Force ECS deployment
        run: |
          aws ecs update-service --cluster panganlink-cluster --service panganlink-frontend --force-new-deployment --region ap-southeast-1
